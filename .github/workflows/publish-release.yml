name: Publish Release to Modrinth

# Minimum Required Secrets:
# - MODRINTH_TOKEN (Modrinth API token with permissions to create versions)
# - DISCORD_WEBHOOK_URL (The URL of the Discord webhook to send notifications to)

on:
  release:
    types: [ published ]

# The dependencies above correspond to:
# - Cobblemon (MdwFAVRL)
# - Matthiesen Lib API (j2JrSWnx)
# - Matthiesen Lib Webhooks (XP5CfD30)
# - GooeyLibs (KzjvlKEN)
# - Cobbreeding (ItmVb4zY)

jobs:
  publish:
    uses: matthiesen-dev/automation/.github/workflows/simple-publish.yml@main
    permissions:
      contents: write
    with:
      tag_name: ${{ github.event.release.tag_name }}
      artifact_basename: "cobblemon-boosters"
      mod_name: "Cobblemon Boosters"
      changelog: ${{ github.event.release.body }}
      fabric_loader_version: "0.17.2+"
      neoforge_loader_version: "21.1.182+"
      modrinth_game_version: "1.21.1"
      modrinth_id: "W8QHSSjM"
      modrinth_dependencies: |-
        [
          {"project_id":"MdwFAVRL","dependency_type":"required"},
          {"project_id":"j2JrSWnx","dependency_type":"required"},
          {"project_id":"XP5CfD30","dependency_type":"optional"},
          {"project_id":"KzjvlKEN","dependency_type":"optional"},
          {"project_id":"ItmVb4zY","dependency_type":"optional"}
        ]
      discord_icon_url: "https://raw.githubusercontent.com/Matthiesen-dev/.github/refs/heads/main/mod-logos/cobblemon-boosters.png"
    secrets:
      git_token: ${{ secrets.GITHUB_TOKEN }}
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}